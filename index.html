<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Premium - Unidad 1</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="app-container">
        <div id="welcome-screen">
            <div class="header">
                <h2>Hola Miguel</h2>
                <div class="avatar-circle">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
                </div>
            </div>
            
            <div class="stats-card">
                <div class="stat-item">
                    <span class="badge yellow">1</span>
                    <div class="stat-info">
                        <small>Ranking</small>
                        <strong>390</strong>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="star-icon">⭐</div>
                    <div class="stat-info">
                        <small>Puntos</small>
                        <strong>1209</strong>
                    </div>
                </div>
            </div>

            <div class="main-actions">
                <button class="btn-create">Crear Quiz</button>
                <button class="btn-enter">Entrar</button>
            </div>

            <h3 class="section-title">Categorías</h3>
            <div class="categories-grid">
                <div class="cat-card" onclick="startQuiz('historia')">
                    <div class="cat-icon icon-blue">📜</div>
                    <h4>Historia</h4>
                    <small>40 Preguntas</small>
                </div>
                <div class="cat-card" onclick="startQuiz('deportes')">
                    <div class="cat-icon icon-yellow">🏆</div>
                    <h4>Deportes</h4>
                    <small>40 Preguntas</small>
                </div>
                <div class="cat-card" onclick="startQuiz('arte')">
                    <div class="cat-icon icon-purple">🎨</div>
                    <h4>Arte</h4>
                    <small>40 Preguntas</small>
                </div>
                <div class="cat-card" onclick="startQuiz('musica')">
                    <div class="cat-icon icon-green">🎵</div>
                    <h4>Música</h4>
                    <small>40 Preguntas</small>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="quiz-header">
                <button class="btn-back" onclick="resetGame()">←</button>
                <div class="timer-container">
                    <div class="timer-circle" id="timer">26</div>
                </div>
            </div>
            <h2 id="question-text" class="question-title">Cual es el Significado de CSS</h2>
            <div id="options-container" class="options-list">
                </div>
        </div>

        <div id="result-screen" class="hidden">
            <div class="result-box">
                <h2>¡Buen trabajo!</h2>
                <p id="score-text"></p>
                <button class="btn-enter" onclick="resetGame()">Volver al Inicio</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
