<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Premium - Unidad 1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <div id="home-screen" class="screen">
            <div class="icon-box">🚀</div>
            <h1>Bienvenido al Quiz</h1>
            <p>Pon a prueba tus habilidades de desarrollo web.</p>
            <button class="main-btn" onclick="startGame()">Comenzar ahora</button>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="header">
                <div class="progress-bar"><div id="bar" class="fill"></div></div>
                <span id="progress">Pregunta 1 de 3</span>
            </div>
            <div id="image-container" class="q-image">🖼️</div>
            <h2 id="questionText">Cargando...</h2>
            <div id="options-container"></div>
        </div>

        <div id="result-screen" class="screen hidden">
            <div class="icon-box">🏆</div>
            <h2>¡Buen trabajo!</h2>
            <p id="score-text">Puntaje: 0</p>
            <button class="main-btn" onclick="resetGame()">Reintentar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
